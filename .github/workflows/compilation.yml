name: CI-compile

on:
  push:
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PS2DEV: /home/runner/ps2dev
      PS2SDK: /home/runner/ps2dev/ps2sdk
      PATH: /home/runner/ps2dev/bin:/home/runner/ps2dev/ee/bin:/home/runner/ps2dev/iop/bin:$PATH
    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y git make gcc g++ texinfo flex bison libucl-dev cmake patch gettext libarchive-tools

      - name: Install YOUR ps2dev
        run: |
          git clone https://github.com/1247847495/ps2dev.git $PS2DEV
          cd $PS2DEV
          ./build-all.sh

      - name: Install YOUR ps2sdk
        run: |
          git clone https://github.com/1247847495/ps2sdk.git $PS2SDK
          cd $PS2SDK
          make -j$(nproc)
          make install

      - name: Install YOUR ps2sdk-ports
        run: |
          git clone https://github.com/1247847495/ps2sdk-ports.git $PS2SDK-ports
          cd $PS2SDK-ports
          make -j$(nproc)
          make install

      - name: Install YOUR ps2-packer
        run: |
          git clone https://github.com/1247847495/packer.git ~/ps2-packer
          cd ~/ps2-packer
          make -j$(nproc)
          make install

      - name: Install YOUR language repo
        run: |
          git clone https://github.com/1247847495/Open-PS2-Loader-lang.git lng
          cp -rf lng/* . || true
          rm -rf lng

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile -> make clean release
        run: make --trace clean release

      - name: Create detailed changelog
        run: sh ./make_changelog.sh

      - name: Upload release artifact ELF
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: OPNPS2LD
          path: |
            OPNPS2LD-*.ELF

      - name: Upload release artifact info
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: INFO
          path: |
            DETAILED_CHANGELOG
            CREDITS
            LICENSE
            README.md

  build-variants:
    strategy:
      fail-fast: false
      matrix:
        extra: [EXTRA_FEATURES=0, EXTRA_FEATURES=1]
        pademu: [PADEMU=0, PADEMU=1]
    runs-on: ubuntu-latest
    env:
      PS2DEV: /home/runner/ps2dev
      PS2SDK: /home/runner/ps2dev/ps2sdk
      PATH: /home/runner/ps2dev/bin:/home/runner/ps2dev/ee/bin:/home/runner/ps2dev/iop/bin:$PATH
    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y git make gcc g++ texinfo flex bison libucl-dev cmake patch gettext libarchive-tools

      - name: Install YOUR ps2dev
        run: |
          git clone https://github.com/1247847495/ps2dev.git $PS2DEV
          cd $PS2DEV
          ./build-all.sh

      - name: Install YOUR ps2sdk
        run: |
          git clone https://github.com/1247847495/ps2sdk.git $PS2SDK
          cd $PS2SDK
          make -j$(nproc)
          make install

      - name: Install YOUR ps2sdk-ports
        run: |
          git clone https://github.com/1247847495/ps2sdk-ports.git $PS2SDK-ports
          cd $PS2SDK-ports
          make -j$(nproc)
          make install

      - name: Install YOUR ps2-packer
        run: |
          git clone https://github.com/1247847495/packer.git ~/ps2-packer
          cd ~/ps2-packer
          make -j$(nproc)
          make install

      - name: Install YOUR language repo
        run: |
          git clone https://github.com/1247847495/Open-PS2-Loader-lang.git lng
          cp -rf lng/* . || true
          rm -rf lng

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: echo "OPL_VERSION=$(make oplversion)" >> $GITHUB_ENV

      - name: Compile
        run: |
          make --trace ${{ matrix.pademu }} ${{ matrix.extra }} NOT_PACKED=1
          mv opl.elf OPNPS2LD-${{ env.OPL_VERSION }}-${{ matrix.pademu }}-${{ matrix.extra }}.ELF

      - name: Upload variants artifact ELF
        uses: actions/upload-artifact@v4
        with:
          name: OPNPS2LD-VARIANTS-${{ matrix.pademu }}-${{ matrix.extra }}
          path: OPNPS2LD*.ELF

  merge-variants:
    runs-on: ubuntu-latest
    needs: build-variants
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: OPNPS2LD-VARIANTS
          pattern: OPNPS2LD-VARIANTS*
          delete-merged: true

  build-lang:
    runs-on: ubuntu-latest
    env:
      PS2DEV: /home/runner/ps2dev
      PS2SDK: /home/runner/ps2dev/ps2sdk
      PATH: /home/runner/ps2dev/bin:/home/runner/ps2dev/ee/bin:/home/runner/ps2dev/iop/bin:$PATH
    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y git make gcc g++ texinfo flex bison libucl-dev cmake patch gettext libarchive-tools

      - name: Install YOUR ps2dev
        run: |
          git clone https://github.com/1247847495/ps2dev.git $PS2DEV
          cd $PS2DEV
          ./build-all.sh

      - name: Install YOUR ps2sdk
        run: |
          git clone https://github.com/1247847495/ps2sdk.git $PS2SDK
          cd $PS2SDK
          make -j$(nproc)
          make install

      - name: Install YOUR ps2sdk-ports
        run: |
          git clone https://github.com/1247847495/ps2sdk-ports.git $PS2SDK-ports
          cd $PS2SDK-ports
          make -j$(nproc)
          make install

      - name: Install YOUR ps2-packer
        run: |
          git clone https://github.com/1247847495/packer.git ~/ps2-packer
          cd ~/ps2-packer
          make -j$(nproc)
          make install

      - name: Install YOUR language repo
        run: |
          git clone https://github.com/1247847495/Open-PS2-Loader-lang.git lng
          cp -rf lng/* . || true
          rm -rf lng

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Compile languages
        run: make --trace download_lng languages

      - name: Create artifact
        run: sh ./lng_pack.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPNPS2LD-LANGS
          path: OPNPS2LD-LANGS-*.zip

  build-debug:
    strategy:
      fail-fast: false
      matrix:
        debug: [iopcore_debug, ingame_debug, eesio_debug, iopcore_ppctty_debug, ingame_ppctty_debug, DTL_T10000=1]
    runs-on: ubuntu-latest
    env:
      PS2DEV: /home/runner/ps2dev
      PS2SDK: /home/runner/ps2dev/ps2sdk
      PATH: /home/runner/ps2dev/bin:/home/runner/ps2dev/ee/bin:/home/runner/ps2dev/iop/bin:$PATH
    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y git make gcc g++ texinfo flex bison libucl-dev cmake patch gettext libarchive-tools

      - name: Install YOUR ps2dev
        run: |
          git clone https://github.com/1247847495/ps2dev.git $PS2DEV
          cd $PS2DEV
          ./build-all.sh

      - name: Install YOUR ps2sdk
        run: |
          git clone https://github.com/1247847495/ps2sdk.git $PS2SDK
          cd $PS2SDK
          make -j$(nproc)
          make install

      - name: Install YOUR ps2sdk-ports
        run: |
          git clone https://github.com/1247847495/ps2sdk-ports.git $PS2SDK-ports
          cd $PS2SDK-ports
          make -j$(nproc)
          make install

      - name: Install YOUR ps2-packer
        run: |
          git clone https://github.com/1247847495/packer.git ~/ps2-packer
          cd ~/ps2-packer
          make -j$(nproc)
          make install

      - name: Install YOUR language repo
        run: |
          git clone https://github.com/1247847495/Open-PS2-Loader-lang.git lng
          cp -rf lng/* . || true
          rm -rf lng

      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --prune --unshallow

      - name: Get version
        run: echo "OPL_VERSION=$(make oplversion)" >> $GITHUB_ENV

      - name: Compile debug
        run: |
          make ${{ matrix.debug }} --trace
          mv opl.elf opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}.elf

      - name: Upload variants artifact ELF
        uses: actions/upload-artifact@v4
        with:
          name: opl-${{ matrix.debug }}-${{ env.OPL_VERSION }}
          path: opl-*.elf

  merge-debug:
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: OPNPS2LD-DEBUG
          pattern: opl-*
          delete-merged: true

  release:
    needs: [build, build-variants, build-lang]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/362053534-patch-1'
    steps:
      - name: git checkout
        uses: actions/checkout@v4

      - run: git fetch --prune --unshallow

      - name: Get version
        run: echo "OPL_VERSION=$(make oplversion)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare artifacts for release
        run: |
          sudo apt install -y p7zip-full
          cp INFO/* OPNPS2LD/ || true
          cp INFO/* OPNPS2LD-VARIANTS/ || true
          7z a -t7z OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD/*
          7z a -t7z OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS/*
          7z a -t7z OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS/*
          cp -f OPNPS2LD-${{ env.OPL_VERSION }}.7z OPNPS2LD.7z
          cp -f OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z OPNPS2LD-VARIANTS.7z
          cp -f OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z OPNPS2LD-LANGS.7z
          cp -f OPNPS2LD/OPNPS2LD-${{ env.OPL_VERSION }}.ELF OPNPS2LD.ELF || true

      - name: Create prerelease
        if: github.ref == 'refs/heads/362053534-patch-1'
        uses: mathieucarbou/marvinpinto-action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: true
          automatic_release_tag: "latest"
          title: "${{ env.OPL_VERSION }}"
          files: |
            OPNPS2LD-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD.7z
            OPNPS2LD-VARIANTS.7z
            OPNPS2LD-LANGS.7z
            OPNPS2LD.ELF

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: mathieucarbou/marvinpinto-action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: "${{ contains(github.ref, '-rc') }}"
          title: "${{ env.OPL_VERSION }}"
          files: |
            OPNPS2LD-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-VARIANTS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD-LANGS-${{ env.OPL_VERSION }}.7z
            OPNPS2LD.7z
            OPNPS2LD-VARIANTS.7z
            OPNPS2LD-LANGS.7z
            OPNPS2LD.ELF
